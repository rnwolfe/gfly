<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0B0E13; --panel:#11151C; --flap:#161B22; --flap-edge:#0A0D12;
    --amber:#F5B70A; --green:#2ECC71; --ink:#D7DCE2; --muted:#6B7280; --line:#1F2731;
  }
  *{margin:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden}
  body{
    background:
      radial-gradient(1100px 520px at 50% -8%, #15212d 0%, transparent 62%),
      var(--bg);
    color:var(--ink);
    font-family:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:64px 80px;position:relative;
  }
  /* corner kickers */
  .corner{position:absolute;top:46px;color:var(--amber);letter-spacing:.34em;
    font-size:18px;font-weight:600}
  .corner.l{left:80px}
  .corner.r{right:80px;color:var(--muted)}
  .corner .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
    background:var(--green);box-shadow:0 0 10px var(--green);margin-right:10px;
    transform:translateY(1px)}

  .hero{display:flex;align-items:center;gap:28px}
  .plane{font-size:96px;line-height:1;transform:translateY(-8px) rotate(-8deg);color:var(--amber)}
  h1{font-size:148px;line-height:.9;letter-spacing:.02em;color:var(--amber);font-weight:800;
     text-shadow:0 0 40px rgba(245,183,10,.28)}
  .tag{font-size:34px;margin-top:26px;color:var(--ink);font-weight:500}
  .tag b{color:var(--amber)}
  .sub{font-size:24px;margin-top:10px;color:var(--muted);letter-spacing:.04em}

  /* split-flap accent row */
  .board{display:flex;gap:7px;margin-top:34px}
  .flap{width:42px;height:58px;border-radius:6px;border:1px solid var(--flap-edge);
    background:linear-gradient(var(--flap),#10141a);color:var(--amber);
    font-size:36px;font-weight:800;display:flex;align-items:center;justify-content:center;
    position:relative;box-shadow:inset 0 -1px 0 rgba(0,0,0,.6)}
  .flap::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.5)}
  .flap.g{color:var(--green)}
  .flap.sp{background:none;border:none;box-shadow:none;width:18px}

  .footer{position:absolute;bottom:46px;left:0;right:0;display:flex;
    justify-content:center;gap:26px;color:var(--muted);font-size:24px}
  .footer b{color:var(--amber)}
  .footer .sep{color:var(--line)}
</style>
</head>
<body>
  <div class="corner l">GFLY · DEPARTURES</div>
  <div class="corner r"><span class="dot"></span>READ-ONLY · NO KEY</div>

  <div class="hero">
    <div class="plane">✈</div>
    <h1>gfly</h1>
  </div>
  <div class="tag"><b>Google Flights</b> for agents</div>
  <div class="sub">a read-only, JSON-first flight-search CLI an LLM can drive</div>

  <!-- decorative split-flap: J F K → L H R   ●  O N   T I M E -->
  <div class="board">
    <div class="flap">J</div><div class="flap">F</div><div class="flap">K</div>
    <div class="flap sp"></div>
    <div class="flap">→</div>
    <div class="flap sp"></div>
    <div class="flap">L</div><div class="flap">H</div><div class="flap">R</div>
    <div class="flap sp"></div><div class="flap sp"></div>
    <div class="flap g">O</div><div class="flap g">N</div>
    <div class="flap sp"></div>
    <div class="flap g">T</div><div class="flap g">I</div><div class="flap g">M</div><div class="flap g">E</div>
  </div>

  <div class="footer">
    <span><b>gfly.sh</b></span><span class="sep">·</span>
    <span>docs.gfly.sh</span><span class="sep">·</span>
    <span>pip · uv · brew</span>
  </div>
</body>
</html>
